name: Build Windows

# 编译 Windows NSIS 安装包。仅手动触发。
# 去 Actions → Build Windows → Run workflow → 选 neo 分支。

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install JS dependencies
        run: npm ci

      - name: Build Tauri app (NSIS installer)
        run: npx tauri build
        env:
          # tauri build 会触发 beforeBuildCommand (npm run build) 编译前端
          # NSIS 由 tauri CLI 自动下载
          CI: true

      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: inspection-windows-installer
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

      - name: Upload raw exe
        uses: actions/upload-artifact@v4
        with:
          name: inspection-windows-exe
          path: src-tauri/target/release/inspection-rust.exe
          if-no-files-found: warn
