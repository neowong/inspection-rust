        - link "多平台融合云管理方案 云计算是一种新型的IT服务模式，它将IT基础设施、应用软件作为服务，通过互联网或企业局域网提供给用户。许多企业通过实施云计算提升快速创新和制定决策的能力，使其在当今高度竞争的环境中快速地做出响应。" [ref=e104]:
