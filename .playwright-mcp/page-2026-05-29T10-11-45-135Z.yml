        - listitem [ref=e201] [cursor=pointer]:
          - link "智能制造能力平台 在企业构建智慧化企业的背景下，提出全过程生产实时感知、实现柔性生产、产品品质的持续改善、智慧化设备管理、智慧综合管理以及智慧安全管理等六大“智慧工厂”建设目标。 本系统主要包括在车间级作业管理的生产数字化管理系统、库管理系统、集控系统、动力能源系统、安防系统、工厂级的MES执行系统、智慧设备信息系统和办公管理的OA系统。现有的车间级作业系统和工厂级的基础业务管理系统对车间生产和厂级信息管理起到了积极的支持作用，但随着智慧企业和智慧工厂的发展规划，现有系统已经不能满足企业和工厂的发展需要。对智慧工厂而言目前系统缺少一套从设备、单元层、车间层等各层面的互联互通、融合的厂级立体感知、对人员岗位事物提示和指导、对生产全流程精准追溯、对工厂数据进行智慧分析的信息化系统。现有系统未对工厂信息全面、高效整合与管理，难以及时对管理决策提供强有力支撑。" [ref=e202]:
            - /url: /newsinfo/2779333.html
            - img [ref=e204]
            - generic [ref=e205]:
              - heading "智能制造能力平台" [level=5] [ref=e206]
              - paragraph [ref=e207]:
                - text: 在企业构建智慧化企业的背景下，提出全过程生产实时感知、实现柔性生产、产品品质的持续改善、智慧化设备管理、智慧综合管理以及智慧安全管理等六大“智慧工厂”建设目标。
                - text: 本系统主要包括在车间级作业管理的生产数字化管理系统、库管理系统、集控系统、动力能源系统、安防系统、工厂级的MES执行系统、智慧设备信息系统和办公管理的OA系统。现有的车间级作业系统和工厂级的基础业务管理系统对车间生产和厂级信息管理起到了积极的支持作用，但随着智慧企业和智慧工厂的发展规划，现有系统已经不能满足企业和工厂的发展需要。对智慧工厂而言目前系统缺少一套从设备、单元层、车间层等各层面的互联互通、融合的厂级立体感知、对人员岗位事物提示和指导、对生产全流程精准追溯、对工厂数据进行智慧分析的信息化系统。现有系统未对工厂信息全面、高效整合与管理，难以及时对管理决策提供强有力支撑。
