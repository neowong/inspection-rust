      - listitem [ref=e89] [cursor=pointer]:
        - link "数据中心运维管理服务 数据中心承载着企业的业务应用和数据，是企业信息化的心脏。良好的数据中心运维是一个企业正常运作的基础。伴随云计算等新技术的发展，对数据中心运维的要求越来越高，难度也越来越大。企业难以独立完成数据中心的运维，数据中心运维外包的趋势已经形成。" [ref=e90]:
          - /url: /newsinfo/522467.html
