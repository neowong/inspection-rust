        - link "IT服务管理系统 随着企业信息化建设的深入，企业的核心业务越来越离不开IT系统的稳定运行，信息系统在企业的日常经营活动中变得越来越重要，信息系统的日常维护和管理通常面临以下几方面的压力： lIT服务管理缺乏流程保障，维护人员忙于救火，缺乏主动服务 lIT组织重视硬平台建设，轻视软平台管理，维护人员与客户满意度低" [ref=e97]:
