<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- 路由器圆形机壳 - 粗线条更明显 -->
  <circle cx="16" cy="16" r="13" stroke="#2563EB" stroke-width="2.2" fill="none"/>
  <!-- 下方两个支撑脚（标志性特征） -->
  <rect x="10" y="28" width="3" height="2" rx="0.5" fill="#2563EB" opacity="0.6"/>
  <rect x="19" y="28" width="3" height="2" rx="0.5" fill="#2563EB" opacity="0.6"/>
  <!-- 左箭头（粗） - 数据转发 -->
  <path d="M2 14 L24 14" stroke="#2563EB" stroke-width="2.8" stroke-linecap="round"/>
  <path d="M18 9 L24 14 L18 19" stroke="#2563EB" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- 右箭头（浅） - 双向路由 -->
  <path d="M8 19 L30 19" stroke="#60A5FA" stroke-width="2.8" stroke-linecap="round"/>
  <path d="M14 14 L8 19 L14 24" stroke="#60A5FA" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- 中心小圆 - 路由处理器 -->
  <circle cx="16" cy="16" r="3" fill="#2563EB" opacity="0.15" stroke="#2563EB" stroke-width="1.2"/>
</svg>
